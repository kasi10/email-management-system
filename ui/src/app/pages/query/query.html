<div class="query-layout">

  <!-- LOADING -->

  <div
    class="loading-overlay"
    *ngIf="isLoading">

    <div class="loading-box">

      <div class="spinner"></div>

      <h2>
        Processing Your Query
      </h2>

      <p>
        Please wait while we process your request
      </p>

    </div>

  </div>

  <!-- CARD -->

  <div class="query-container">

    <!-- TOP -->

    <div class="topbar">

      <div>

        <h1>
          Submit Query
        </h1>

        <p>
          AI-powered enterprise email routing
        </p>

      </div>

      <button
        class="home-btn"
        (click)="goHome()">

        Home

      </button>

    </div>

    <!-- ALERTS -->

    <div
      class="success-msg"
      *ngIf="successMessage">

      {{ successMessage }}

    </div>

    <div
      class="error-msg"
      *ngIf="errorMessage">

      {{ errorMessage }}

    </div>

    <!-- FORM -->

    <div class="form-section">

      <!-- EMAIL -->

      <div class="input-group">

        <label>
          Sender Email
        </label>

        <input
          type="email"
          [(ngModel)]="senderEmail"
          placeholder="john@example.com"
          [disabled]="isLoading"
        />

      </div>

      <!-- SUBJECT -->

      <div class="input-group">

        <label>
          Subject
        </label>

        <input
          type="text"
          [(ngModel)]="subject"
          placeholder="Enter email subject"
          [disabled]="isLoading"
        />

      </div>

      <!-- BODY -->

      <div class="input-group">

        <label>
          Email Body
        </label>

        <textarea
          rows="10"
          [(ngModel)]="body"
          placeholder="Write your query details here..."
          [disabled]="isLoading"
        ></textarea>

      </div>

      <!-- BUTTON -->

      <button
        class="submit-btn"
        (click)="submitQuery()"
        [disabled]="isLoading">

        <span *ngIf="!isLoading">

          Submit Query

        </span>

        <span *ngIf="isLoading">

          Processing...

        </span>

      </button>

    </div>

  </div>

</div>
