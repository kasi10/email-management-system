<div class="query-page">

  <!-- LOADING OVERLAY -->

  <div class="loading-overlay" *ngIf="isLoading">

    <div class="loading-box">

      <div class="spinner"></div>

      <h2>AI is classifying your query...</h2>

      <p>
        Please wait while we process your email
      </p>

    </div>

  </div>

  <div class="query-card">

    <div class="top-actions">

      <button class="home-btn" (click)="goHome()">
        Home
      </button>

    </div>

    <h1>Submit Query</h1>

    <p class="subtitle">
      Submit your tax-related email query
    </p>

    <div class="success-msg" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="error-msg" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <input
      type="email"
      [(ngModel)]="senderEmail"
      placeholder="Sender Email"
      [disabled]="isLoading"
    />

    <input
      type="text"
      [(ngModel)]="subject"
      placeholder="Subject"
      [disabled]="isLoading"
    />

    <textarea
      rows="10"
      [(ngModel)]="body"
      placeholder="Write your email body here..."
      [disabled]="isLoading"
    ></textarea>

    <button
      class="submit-btn"
      (click)="submitQuery()"
      [disabled]="isLoading"
    >

      <span *ngIf="!isLoading">
        Send Query
      </span>

      <span *ngIf="isLoading">
        Processing...
      </span>

    </button>

  </div>

</div>
