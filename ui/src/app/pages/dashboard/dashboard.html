<div class="dashboard-page">

  <aside class="sidebar">
    <div class="logo">TaxFlow AI</div>

    <nav class="menu">

  <a
    routerLink="/dashboard"
    class="menu-item active">

    Dashboard

  </a>

  <a
    routerLink="/user-management"
    class="menu-item">

    User Management

  </a>

  <a
    routerLink="/queries"
    class="menu-item">

    Queries

  </a>

</nav>

    <button class="logout-btn" (click)="logout()">Logout</button>
  </aside>

  <main class="main-content">

    <div class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p>Overview of system users</p>
      </div>
    </div>

    <section class="stat-card">
      <h3>Total Users</h3>
      <span>{{ users.length }}</span>
    </section>

    <section class="table-card">

      <table>

        <thead>
          <tr>
            <th>Username</th>
            <th>Display Name</th>
            <th>Role</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.username }}</td>
            <td>{{ user.displayName }}</td>
            <td>{{ user.role }}</td>
            <td><span class="status active">Active</span></td>
          </tr>
        </tbody>

      </table>

    </section>

  </main>
</div>
